name: Neovim Plugin

# Manual, on its own clock like the other editor plugins.
#
# The plugin is plain Lua and Vimscript with no build step — a plugin manager points at a
# directory. So "packaging" is bundling that directory into a tarball a user can drop into
# their runtimepath or a manager can unpack. A headless Neovim run first loads the Lua as a
# smoke check, so a syntax error in a plugin file fails the run rather than a user's editor.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true

      # Compile every Lua file with `loadfile` — a syntax check that does not *run* the
      # file, so a plugin that requires an external dependency at load time (nvim-treesitter,
      # say) is not a false failure. `assert` turns a parse error into a non-zero exit.
      - name: Syntax-check the Lua
        run: |
          set -eux
          for f in $(find extra/neovim -name '*.lua'); do
            nvim --headless -c "lua assert(loadfile('$f'))" -c "qa"
          done

      - name: Bundle
        run: |
          set -eux
          tar -czf neon-neovim.tar.gz -C extra neovim

      - uses: actions/upload-artifact@v4
        with:
          name: neon-neovim-plugin
          path: neon-neovim.tar.gz
