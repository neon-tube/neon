name: Release (aarch64 macos)

# Manual. Produces the toolchain a user installs: the `neon` binary with the
# sysroot (include/, lib/<flavor>/, stdlib/) they resolve relative to themselves, packaged
# in the install layout, as a workflow artifact. Nothing is published anywhere by this
# workflow. The VS Code extension has its own workflow (vscode.yml), so it can ship without
# cutting a toolchain release.
#
# One workflow per target: an artifact is native to the machine that built it (the runtime
# archives are that platform's object code, and the arm64/Apple Clang archive is only
# LTO-usable when built on macOS — see runtime/CMakeLists.txt), so each target builds on its
# own runner. macOS runners bill at 10x, so this is kept separate from release-linux.yml
# rather than sharing a matrix: a linux-only cut never pays for one. Keep the steps here in
# sync with it.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  toolchain:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --locked

      # `cargo build` already staged include/, lib/, stdlib/ next to the binaries. Assemble
      # a prefix: bin/ beside them, which is what `Sysroot::find` resolves from bin/neon's
      # parent. (`neon-lsp` ships from its own repo now, so it is not bundled here.)
      - name: Stage prefix
        run: |
          set -eux
          prefix=neon-aarch64-macos
          mkdir -p "$prefix/bin"
          cp target/release/neon "$prefix/bin/"
          cp -r target/release/include target/release/lib target/release/stdlib "$prefix/"
          tar -czf "$prefix.tar.gz" "$prefix"

      # A shipped toolchain that only breaks when a user runs it is worse than a failed
      # build. `doctor` compiles and runs a smoke program end to end.
      - name: Smoke test the package
        run: |
          set -eux
          cd neon-aarch64-macos
          NEON_SYSROOT="$PWD" ./bin/neon doctor

      - uses: actions/upload-artifact@v4
        with:
          name: neon-aarch64-macos
          path: neon-aarch64-macos.tar.gz
